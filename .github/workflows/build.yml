name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - Dockerfile
  workflow_dispatch:
    inputs:
      comfyui_version:
        description: "ComfyUI version tag to build (e.g. v0.16.4). Defaults to value in Dockerfile."
        required: false
        default: ""
  workflow_call:
    inputs:
      comfyui_version:
        description: "ComfyUI version tag to build."
        type: string
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve ComfyUI Version
        id: version
        run: |
          DOCKERFILE_VERSION=$(grep -m1 'ARG COMFYUI_VERSION=' Dockerfile | cut -d= -f2)
          INPUT_VERSION="${{ inputs.comfyui_version }}"
          FINAL="${INPUT_VERSION:-$DOCKERFILE_VERSION}"
          echo "value=${FINAL}" >> "$GITHUB_OUTPUT"

      - name: Set Lowercase Image Name
        id: image
        run: |
          echo "name=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.value }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMFYUI_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
